name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          semantic_version: 24

  docker-release-main:
    name: Build Main App Docker Image
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract main app metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/mlnative/paperjet
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.version }}
            type=raw,value=latest,enable=true

      - name: Build and push main app multi-platform Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=docker.io/mlnative/paperjet:buildcache
          cache-to: type=registry,ref=docker.io/mlnative/paperjet:buildcache,mode=max

  docker-release-ml:
    name: Build ML Service Docker Image
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract ML service metadata
        id: ml-meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/mlnative/paperjet-ml
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.version }}
            type=raw,value=latest,enable=true

      - name: Build and push ML service multi-platform Docker image
        id: ml-build
        uses: docker/build-push-action@v5
        with:
          context: ./apps/ml
          file: ./apps/ml/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.ml-meta.outputs.tags }}
          labels: ${{ steps.ml-meta.outputs.labels }}
          cache-from: type=registry,ref=docker.io/mlnative/paperjet-ml:buildcache
          cache-to: type=registry,ref=docker.io/mlnative/paperjet-ml:buildcache,mode=max

  deploy-main-production:
    name: Deploy Main App to Production
    needs: [release, docker-release-main]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Extract production image tag
        id: image
        run: |
          # Use the specific version tag for production deployments
          VERSION_TAG="${{ needs.release.outputs.version }}"
          IMAGE_NAME="mlnative/paperjet"
          echo "tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
          echo "name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "Deploying main app: docker.io/${IMAGE_NAME}:${VERSION_TAG}"

      - name: Update Coolify production main application image
        run: |
          curl -X PATCH \
            "${{ secrets.COOLIFY_PROD_URL }}/api/v1/applications/${{ secrets.COOLIFY_PROD_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_PROD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "docker_registry_image_name": "${{ steps.image.outputs.name }}",
              "docker_registry_image_tag": "${{ steps.image.outputs.tag }}"
            }'

      - name: Deploy main app to Coolify Production
        run: |
          curl -X GET \
            "${{ secrets.COOLIFY_PROD_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_PROD_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_PROD_TOKEN }}" \
            -H "Content-Type: application/json"

  deploy-ml-production:
    name: Deploy ML Service to Production
    needs: [release, docker-release-ml]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Extract production image tag
        id: image
        run: |
          # Use the specific version tag for production deployments
          VERSION_TAG="${{ needs.release.outputs.version }}"
          ML_IMAGE_NAME="mlnative/paperjet-ml"
          echo "tag=${VERSION_TAG}" >> $GITHUB_OUTPUT
          echo "ml_name=${ML_IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "Deploying ML service: docker.io/${ML_IMAGE_NAME}:${VERSION_TAG}"

      - name: Update Coolify production ML service image
        run: |
          curl -X PATCH \
            "${{ secrets.COOLIFY_PROD_URL }}/api/v1/applications/${{ secrets.COOLIFY_PROD_ML_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_PROD_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "docker_registry_image_name": "${{ steps.image.outputs.ml_name }}",
              "docker_registry_image_tag": "${{ steps.image.outputs.tag }}"
            }'

      - name: Deploy ML service to Coolify Production
        run: |
          curl -X GET \
            "${{ secrets.COOLIFY_PROD_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_PROD_ML_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_PROD_TOKEN }}" \
            -H "Content-Type: application/json"
