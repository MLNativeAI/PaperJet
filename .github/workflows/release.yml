name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          semantic_version: 24

  docker-release-main:
    name: Retag Main App Docker Image
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Get commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract main app metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/mlnative/paperjet
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.version }}
            type=raw,value=latest,enable=true

      - name: Pull dev image
        run: docker pull docker.io/mlnative/paperjet-dev:${{ steps.sha.outputs.sha }}

      - name: Retag and push production images
        run: |
          IFS=$'\n' read -r -d '' -a TAGS <<< "${{ steps.meta.outputs.tags }}"
          for tag in "${TAGS[@]}"; do
            docker tag docker.io/mlnative/paperjet-dev:${{ steps.sha.outputs.sha }} "$tag"
            docker push "$tag"
          done

  docker-release-ml:
    name: Retag ML Service Docker Image
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Get commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract ML service metadata
        id: ml-meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/mlnative/paperjet-ml
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.version }}
            type=raw,value=latest,enable=true

      - name: Pull dev ML image
        run: docker pull docker.io/mlnative/paperjet-ml-dev:${{ steps.sha.outputs.sha }}

      - name: Retag and push production ML images
        run: |
          IFS=$'\n' read -r -d '' -a TAGS <<< "${{ steps.ml-meta.outputs.tags }}"
          for tag in "${TAGS[@]}"; do
            docker tag docker.io/mlnative/paperjet-ml-dev:${{ steps.sha.outputs.sha }} "$tag"
            docker push "$tag"
          done

  deploy-main-production:
    name: Deploy Main App to Production
    needs: [release, docker-release-main]
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      registry: docker.io
      image_name: mlnative/paperjet
      image_tag: ${{ needs.release.outputs.version }}
      environment: production
    secrets:
      coolify_url: ${{ secrets.COOLIFY_PROD_URL }}
      coolify_app_uuid: ${{ secrets.COOLIFY_PROD_APP_UUID }}
      coolify_token: ${{ secrets.COOLIFY_PROD_TOKEN }}

  deploy-ml-production:
    name: Deploy ML Service to Production
    needs: [release, docker-release-ml]
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      registry: docker.io
      image_name: mlnative/paperjet-ml
      image_tag: ${{ needs.release.outputs.version }}
      environment: production
    secrets:
      coolify_url: ${{ secrets.COOLIFY_PROD_URL }}
      coolify_app_uuid: ${{ secrets.COOLIFY_PROD_ML_APP_UUID }}
      coolify_token: ${{ secrets.COOLIFY_PROD_TOKEN }}
