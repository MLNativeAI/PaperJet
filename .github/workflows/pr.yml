name: PR & Branch Build

on:
  pull_request:
    branches:
      - main

jobs:
  build-core:
    name: Build Core Application
    uses: ./.github/workflows/reusable/build-core.yml
    with:
      registry: docker.io
      image_name: mlnative/paperjet-dev
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

  build-ml:
    name: Build ML Application
    uses: ./.github/workflows/reusable/build-ml.yml
    with:
      registry: docker.io
      image_name: mlnative/paperjet-ml-dev
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
