name: Staging Build & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: mlnative/paperjet-dev
  ML_IMAGE_NAME: mlnative/paperjet-ml-dev

jobs:
  build-main:
    name: Build Main App
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract main app metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}-{{sha}},enable={{is_default_branch}}

      - name: Build and push main app Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          # cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64

  build-ml:
    name: Build ML Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract ML service metadata
        id: ml-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ML_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}-{{sha}},enable={{is_default_branch}}

      - name: Build and push ML service Docker image
        id: ml-build
        uses: docker/build-push-action@v5
        with:
          context: ./apps/ml
          file: ./apps/ml/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.ml-meta.outputs.tags }}
          labels: ${{ steps.ml-meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.ML_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.ML_IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64

  deploy-main-staging:
    name: Deploy Main App to Staging
    needs: build-main
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Extract image tag
        id: image
        run: |
          # Extract the short SHA (first 7 characters)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${SHORT_SHA}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "name=${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT
          echo "Deploying main app: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

      - name: Update Coolify main application image
        run: |
          curl -X PATCH \
            "${{ secrets.COOLIFY_DEV_URL }}/api/v1/applications/${{ secrets.COOLIFY_DEV_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_DEV_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "docker_registry_image_name": "${{ steps.image.outputs.name }}",
              "docker_registry_image_tag": "${{ steps.image.outputs.tag }}"
            }'

      - name: Deploy main app to Coolify
        run: |
          curl -X GET \
            "${{ secrets.COOLIFY_DEV_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_DEV_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_DEV_TOKEN }}" \
            -H "Content-Type: application/json"

  deploy-ml-staging:
    name: Deploy ML Service to Staging
    needs: build-ml
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Extract image tag
        id: image
        run: |
          # Extract the short SHA (first 7 characters)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_TAG="${SHORT_SHA}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "ml_name=${{ env.ML_IMAGE_NAME }}" >> $GITHUB_OUTPUT
          echo "Deploying ML service: ${{ env.REGISTRY }}/${{ env.ML_IMAGE_NAME }}:${IMAGE_TAG}"

      - name: Update Coolify ML service image
        run: |
          curl -X PATCH \
            "${{ secrets.COOLIFY_DEV_URL }}/api/v1/applications/${{ secrets.COOLIFY_DEV_ML_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_DEV_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "docker_registry_image_name": "${{ steps.image.outputs.ml_name }}",
              "docker_registry_image_tag": "${{ steps.image.outputs.tag }}"
            }'

      - name: Deploy ML service to Coolify
        run: |
          curl -X GET \
            "${{ secrets.COOLIFY_DEV_URL }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_DEV_ML_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_DEV_TOKEN }}" \
            -H "Content-Type: application/json"
